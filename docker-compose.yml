services:
  postgres:
    image: pgvector/pgvector:pg17-trixie
    container_name: cdrag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cdrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdrag_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cdrag}
    ports:
      - "5432:5432"
    volumes:
      - cdrag_pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdrag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: cdrag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cdrag_pgdata:
