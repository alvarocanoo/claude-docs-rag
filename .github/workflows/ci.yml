name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest (smoke + unit)
        run: uv run pytest -m "not evals" --cov=src --cov-report=term-missing

  docker-lint:
    # Lightweight check: validates Dockerfile syntax + best practices without
    # running the full build (torch + sentence-transformers wheels make the
    # full build 15+ min on GHA free runners). A real build runs on deploy.
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: tty
          failure-threshold: error

  evals:
    # Regression gate. Runs against the real Neon corpus + Groq free tier to
    # produce evals/latest.json, then compares it to the committed
    # evals/baseline.json. PR merge is blocked if any guarded metric drops by
    # more than the tolerance set in scripts/check_regression.py.
    #
    # Gated on POSTGRES_DSN + GROQ_API_KEY repo secrets being present, so the
    # job is a no-op for forks / unconfigured environments rather than a hard
    # failure.
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    env:
      POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LLM_PROVIDER: groq
      GROQ_MODEL: llama-3.1-8b-instant  # matches evals/baseline.json
    steps:
      - name: Skip if secrets are missing
        id: gate
        run: |
          if [ -z "$POSTGRES_DSN" ] || [ -z "$GROQ_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Eval gate unconfigured (set POSTGRES_DSN + GROQ_API_KEY secrets). Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'

      - uses: astral-sh/setup-uv@v3
        if: steps.gate.outputs.skip == 'false'
        with:
          enable-cache: true

      - name: Setup Python
        if: steps.gate.outputs.skip == 'false'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.gate.outputs.skip == 'false'
        run: uv sync --extra dev

      - name: Sanity-check Neon connection
        if: steps.gate.outputs.skip == 'false'
        run: uv run cdrag check-db

      - name: Build BM25 index from Neon
        if: steps.gate.outputs.skip == 'false'
        run: uv run cdrag build-bm25

      - name: Run eval suite (--limit 5 for CI; baseline is full 32)
        if: steps.gate.outputs.skip == 'false'
        run: uv run cdrag eval --limit 5

      - name: Regression gate vs evals/baseline.json
        if: steps.gate.outputs.skip == 'false'
        run: uv run python scripts/check_regression.py

      - name: Upload eval artifacts
        if: steps.gate.outputs.skip == 'false' && always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-latest
          path: evals/latest.json
          if-no-files-found: warn
