name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest (smoke + unit)
        run: uv run pytest -m "not evals" --cov=src --cov-report=term-missing

  evals:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg17-trixie
        env:
          POSTGRES_USER: cdrag
          POSTGRES_PASSWORD: cdrag_dev
          POSTGRES_DB: cdrag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cdrag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest tests/evals -m evals --tb=short
      - name: Check regression gate
        run: uv run python scripts/check_regression.py
